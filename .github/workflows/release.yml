name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libatk1.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libssl-dev

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar czf ../../voxtty-${{ github.ref_name }}-linux-x86_64.tar.gz voxtty

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxtty-linux-x86_64
          path: voxtty-${{ github.ref_name }}-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum voxtty-*.tar.gz > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            voxtty-*.tar.gz
            checksums-sha256.txt
